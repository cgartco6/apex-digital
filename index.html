<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Digital Pro</title>
    <!-- Tailwind + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Fabric.js, jsPDF, JSZip, FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #0b0f1c; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(18,24,38,0.85); backdrop-filter: blur(2px); border: 1px solid rgba(249,115,22,0.25); }
        .tab-active { border-bottom: 3px solid #f97316; background: rgba(249,115,22,0.15); color: white; }
        .pro-badge { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .layer-item:hover { background: rgba(249,115,22,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // --------------------- UTILITIES ---------------------
        const getStorageKey = (role, key) => `${role}_${key}`;
        const saveToLocal = (role, key, data) => localStorage.setItem(getStorageKey(role, key), JSON.stringify(data));
        const loadFromLocal = (role, key, defaultValue) => {
            const raw = localStorage.getItem(getStorageKey(role, key));
            return raw ? JSON.parse(raw) : defaultValue;
        };

        // --------------------- CONSTANTS ---------------------
        const BANK_DETAILS = {
            bank: "FNB (First National Bank)",
            accountName: "Apex Digital (Pty) Ltd",
            accountNumber: "62849612345",
            branchCode: "250655",
            referencePrefix: "APX"
        };
        const DEFAULT_AD = {
            headline: "Create Scroll-Stopping Social Ads in Minutes",
            copy: "Apex Social Media Ad Creator helps you design high‑conversion ads with AI‑assisted copy and instant previews. No design skills needed.",
            image: "https://placehold.co/600x400/1e293b/f97316?text=Apex+Ad+Creator",
            cta: "Try for Free"
        };

        // --------------------- DESIGN STUDIO (simplified, but fully functional) ---------------------
        const DesignStudio = ({ role }) => {
            const canvasRef = React.useRef(null);
            const fabricCanvas = React.useRef(null);
            const [layers, setLayers] = React.useState([]);
            const [selectedId, setSelectedId] = React.useState(null);

            const updateLayers = () => {
                if (!fabricCanvas.current) return;
                const objects = fabricCanvas.current.getObjects();
                setLayers(objects.map((obj, i) => ({ id: i, type: obj.type, text: obj.text || '' })));
            };

            React.useEffect(() => {
                if (!canvasRef.current) return;
                const canvas = new fabric.Canvas(canvasRef.current, {
                    width: 580,
                    height: 360,
                    backgroundColor: '#1f2937',
                });
                fabricCanvas.current = canvas;
                const saved = loadFromLocal(role, 'design_state', null);
                if (saved) canvas.loadFromJSON(saved, () => canvas.renderAll());
                else {
                    const defaultText = new fabric.IText('APEX\nDESIGN', { left: 100, top: 120, fontSize: 36, fill: '#f97316', fontFamily: 'Inter' });
                    canvas.add(defaultText);
                    canvas.renderAll();
                }
                canvas.on('object:added', updateLayers);
                canvas.on('object:removed', updateLayers);
                canvas.on('selection:created', updateLayers);
                canvas.on('selection:cleared', () => setSelectedId(null));
                updateLayers();
                return () => canvas.dispose();
            }, [role]);

            const addText = () => {
                const text = new fabric.IText('Edit me', { left: 50, top: 50, fontSize: 24, fill: '#fff' });
                fabricCanvas.current.add(text);
                fabricCanvas.current.renderAll();
            };
            const addRect = () => {
                const rect = new fabric.Rect({ width: 80, height: 80, fill: '#f97316', left: 200, top: 200, stroke: 'white' });
                fabricCanvas.current.add(rect);
                fabricCanvas.current.renderAll();
            };
            const uploadImage = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    fabric.Image.fromURL(ev.target.result, (img) => {
                        img.scaleToWidth(150);
                        fabricCanvas.current.add(img);
                        fabricCanvas.current.renderAll();
                    });
                };
                reader.readAsDataURL(file);
            };
            const styleSelected = (prop, val) => {
                const active = fabricCanvas.current.getActiveObject();
                if (active) {
                    active.set(prop, val);
                    fabricCanvas.current.renderAll();
                }
            };
            const exportPNG = () => {
                const dataURL = fabricCanvas.current.toDataURL('png');
                const link = document.createElement('a');
                link.download = 'apex-design.png';
                link.href = dataURL;
                link.click();
            };
            const saveDesign = () => {
                const json = JSON.stringify(fabricCanvas.current.toJSON());
                saveToLocal(role, 'design_state', json);
                alert('Design saved');
            };

            return (
                <div className="space-y-4">
                    <div className="flex flex-wrap gap-2">
                        <button onClick={addText} className="bg-indigo-600 px-3 py-1.5 rounded text-sm"><i className="fas fa-font mr-1"></i>Text</button>
                        <button onClick={addRect} className="bg-emerald-600 px-3 py-1.5 rounded text-sm"><i className="fas fa-square mr-1"></i>Shape</button>
                        <label className="bg-purple-600 px-3 py-1.5 rounded text-sm cursor-pointer"><i className="fas fa-image mr-1"></i>Image<input type="file" accept="image/*" className="hidden" onChange={uploadImage} /></label>
                        <div className="flex gap-1">
                            <button onClick={() => styleSelected('fontWeight', 'bold')} className="bg-gray-700 px-2 rounded"><b>B</b></button>
                            <button onClick={() => styleSelected('fontStyle', 'italic')} className="bg-gray-700 px-2 rounded"><i>I</i></button>
                            <input type="color" onChange={(e) => styleSelected('fill', e.target.value)} className="w-8 h-8 rounded" />
                        </div>
                        <button onClick={exportPNG} className="bg-blue-600 px-3 py-1.5 rounded text-sm"><i className="fas fa-download mr-1"></i>PNG</button>
                        <button onClick={saveDesign} className="bg-green-700 px-3 py-1.5 rounded text-sm"><i className="fas fa-save mr-1"></i>Save</button>
                    </div>
                    <div className="flex justify-center"><canvas ref={canvasRef} className="border border-gray-600 rounded-xl shadow-xl" style={{ maxWidth: '100%', height: 'auto' }}></canvas></div>
                    <div className="glass-card p-2 rounded-xl">
                        <h4 className="text-sm font-bold">Layers</h4>
                        <div className="max-h-32 overflow-auto">
                            {layers.map((l, idx) => (
                                <div key={idx} className={`layer-item p-1 text-xs cursor-pointer ${selectedId === idx ? 'bg-orange-800' : ''}`} onClick={() => { fabricCanvas.current.setActiveObject(fabricCanvas.current.getObjects()[idx]); fabricCanvas.current.renderAll(); setSelectedId(idx); }}>
                                    <i className={`fas fa-${l.type === 'text' ? 'font' : 'square'} mr-1`}></i> {l.text || l.type}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --------------------- BRANDING STUDIO (simplified) ---------------------
        const BrandingStudio = ({ role }) => {
            const [primary, setPrimary] = React.useState(loadFromLocal(role, 'brand_primary', '#f97316'));
            const [secondary, setSecondary] = React.useState(loadFromLocal(role, 'brand_secondary', '#3b82f6'));
            const [font, setFont] = React.useState(loadFromLocal(role, 'brand_font', 'Inter'));
            const [logo, setLogo] = React.useState(loadFromLocal(role, 'brand_logo', 'https://placehold.co/200x80/1e293b/f97316?text=APEX+LOGO'));
            const [tempLogo, setTempLogo] = React.useState('');

            React.useEffect(() => {
                saveToLocal(role, 'brand_primary', primary);
                saveToLocal(role, 'brand_secondary', secondary);
                saveToLocal(role, 'brand_font', font);
                saveToLocal(role, 'brand_logo', logo);
            }, [primary, secondary, font, logo, role]);

            const exportZip = async () => {
                const zip = new JSZip();
                zip.file("brand.css", `:root{--primary:${primary};--secondary:${secondary};--font:${font}}`);
                if (logo && logo.startsWith('http')) {
                    try {
                        const res = await fetch(logo);
                        const blob = await res.blob();
                        zip.file("logo.png", blob);
                    } catch(e) {}
                }
                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, "apex-brand-kit.zip");
            };

            return (
                <div className="grid md:grid-cols-2 gap-6">
                    <div className="space-y-4">
                        <div><label>Primary</label><input type="color" value={primary} onChange={e => setPrimary(e.target.value)} className="w-full h-10 rounded" /></div>
                        <div><label>Secondary</label><input type="color" value={secondary} onChange={e => setSecondary(e.target.value)} className="w-full h-10 rounded" /></div>
                        <div><label>Font</label><select value={font} onChange={e => setFont(e.target.value)} className="bg-gray-800 p-2 rounded w-full"><option>Inter</option><option>Poppins</option><option>Montserrat</option></select></div>
                        <div><label>Logo URL</label><div className="flex gap-2"><input value={tempLogo} onChange={e => setTempLogo(e.target.value)} className="bg-gray-800 flex-1 p-2 rounded" /><button onClick={() => tempLogo && setLogo(tempLogo)} className="bg-orange-600 px-3 rounded">Set</button></div></div>
                        <button onClick={exportZip} className="bg-blue-600 w-full py-2 rounded"><i className="fas fa-file-zipper mr-2"></i>Download ZIP</button>
                    </div>
                    <div className="glass-card p-4 rounded-2xl" style={{ backgroundColor: secondary+'20', borderTopColor: primary, borderTopWidth: 4, fontFamily: font }}>
                        <h3 style={{color:primary}}>APEX Preview</h3>
                        <div className="flex gap-2 mt-2"><span className="px-3 py-1 rounded text-white" style={{background:primary}}>Primary</span><span className="px-3 py-1 rounded text-white" style={{background:secondary}}>Secondary</span></div>
                        <img src={logo} className="max-h-16 mt-2" alt="logo" />
                    </div>
                </div>
            );
        };

        // --------------------- MARKETING STUDIO (simplified) ---------------------
        const MarketingStudio = ({ role, aggressiveBoostFlag, onBoostAcknowledge }) => {
            const [campaigns, setCampaigns] = React.useState(loadFromLocal(role, 'campaigns', [
                { id:1, name:"Summer Blast", budget:2500, impressions:45800, clicks:3100, conversions:342 },
                { id:2, name:"Flash Sale", budget:1200, impressions:23400, clicks:2100, conversions:198 }
            ]));
            const [newCampaign, setNewCampaign] = React.useState({ name: "", budget: "" });

            React.useEffect(() => {
                saveToLocal(role, 'campaigns', campaigns);
            }, [campaigns, role]);

            React.useEffect(() => {
                if (aggressiveBoostFlag) {
                    setCampaigns(prev => prev.map(c => ({
                        ...c,
                        impressions: Math.floor(c.impressions * 1.4),
                        clicks: Math.floor(c.clicks * 1.5),
                        conversions: Math.floor(c.conversions * 1.35)
                    })));
                    if (onBoostAcknowledge) onBoostAcknowledge();
                }
            }, [aggressiveBoostFlag]);

            const addCampaign = () => {
                if (!newCampaign.name || !newCampaign.budget) return;
                setCampaigns([...campaigns, {
                    id: Date.now(),
                    name: newCampaign.name,
                    budget: parseInt(newCampaign.budget),
                    impressions: Math.floor(Math.random()*20000)+5000,
                    clicks: Math.floor(Math.random()*2000),
                    conversions: Math.floor(Math.random()*200)
                }]);
                setNewCampaign({ name: "", budget: "" });
            };
            const exportCSV = () => {
                const headers = ["Name","Budget","Impressions","Clicks","Conversions"];
                const rows = campaigns.map(c => [c.name, c.budget, c.impressions, c.clicks, c.conversions]);
                const csv = [headers, ...rows].map(row => row.join(",")).join("\n");
                const blob = new Blob([csv], { type: "text/csv" });
                saveAs(blob, "campaigns.csv");
            };
            const totals = campaigns.reduce((acc,c) => ({
                impressions: acc.impressions + c.impressions,
                clicks: acc.clicks + c.clicks,
                conversions: acc.conversions + c.conversions,
                budget: acc.budget + c.budget
            }), {impressions:0, clicks:0, conversions:0, budget:0});

            return (
                <div className="space-y-5">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div className="glass-card p-2 text-center"><i className="fas fa-eye"></i><p className="text-xl font-bold">{totals.impressions.toLocaleString()}</p><p className="text-xs">Impressions</p></div>
                        <div className="glass-card p-2 text-center"><i className="fas fa-mouse-pointer"></i><p className="text-xl font-bold">{totals.clicks.toLocaleString()}</p><p className="text-xs">Clicks</p></div>
                        <div className="glass-card p-2 text-center"><i className="fas fa-chart-line"></i><p className="text-xl font-bold">{totals.conversions}</p><p className="text-xs">Conversions</p></div>
                        <div className="glass-card p-2 text-center"><i className="fas fa-chart-simple"></i><p className="text-xl font-bold">{((totals.conversions*45)/totals.budget || 0).toFixed(1)}%</p><p className="text-xs">Est. ROI</p></div>
                    </div>
                    <div className="glass-card p-4 rounded-2xl">
                        <div className="flex justify-between"><h4 className="font-bold">Campaigns</h4><button onClick={exportCSV} className="bg-green-700 text-xs px-2 py-1 rounded">CSV</button></div>
                        <div className="max-h-64 overflow-auto space-y-2 mt-2">
                            {campaigns.map(c => (
                                <div key={c.id} className="bg-gray-800 p-2 rounded flex justify-between text-sm">
                                    <span><b>{c.name}</b> (${c.budget})</span>
                                    <span>{c.impressions} / {c.clicks} / {c.conversions}</span>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-2 mt-3">
                            <input placeholder="Name" value={newCampaign.name} onChange={e => setNewCampaign({...newCampaign, name: e.target.value})} className="bg-gray-700 p-2 rounded flex-1 text-sm" />
                            <input placeholder="$ Budget" type="number" value={newCampaign.budget} onChange={e => setNewCampaign({...newCampaign, budget: e.target.value})} className="bg-gray-700 p-2 rounded w-28 text-sm" />
                            <button onClick={addCampaign} className="bg-orange-600 px-3 rounded">+</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --------------------- PAYMENT SYSTEM (simplified) ---------------------
        const PaymentSystem = ({ role, onPaymentVerified }) => {
            const [requests, setRequests] = React.useState(loadFromLocal(role, 'payment_requests', []));
            const [amount, setAmount] = React.useState('');
            const [reason, setReason] = React.useState('');
            const [isPro, setIsPro] = React.useState(() => loadFromLocal(role, 'pro_status', false));

            const createRequest = () => {
                if (!amount || parseFloat(amount) <= 0) return alert("Enter amount");
                const ref = `${BANK_DETAILS.referencePrefix}-${Math.floor(Math.random()*100000)}`;
                const newReq = { id: Date.now(), amount: parseFloat(amount), reason: reason || "Pro Upgrade", reference: ref, status: "pending", date: new Date().toISOString(), proofDataUrl: null };
                const updated = [newReq, ...requests];
                setRequests(updated);
                saveToLocal(role, 'payment_requests', updated);
                setAmount(''); setReason('');
                alert(`Request created! Ref: ${ref}\nEFT to:\n${BANK_DETAILS.bank}\n${BANK_DETAILS.accountName}\n${BANK_DETAILS.accountNumber}\n${BANK_DETAILS.branchCode}\nRef: ${ref}`);
            };

            const verify = (id) => {
                const updated = requests.map(r => r.id === id ? { ...r, status: "verified" } : r);
                setRequests(updated);
                saveToLocal(role, 'payment_requests', updated);
                if (updated.some(r => r.status === "verified")) {
                    setIsPro(true);
                    saveToLocal(role, 'pro_status', true);
                    if (onPaymentVerified) onPaymentVerified();
                    alert("Pro unlocked!");
                }
            };

            const resetPro = () => {
                if (confirm("Reset Pro?")) {
                    setIsPro(false);
                    saveToLocal(role, 'pro_status', false);
                    setRequests(requests.map(r => ({ ...r
