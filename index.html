<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Apex Digital Pro | Design · Brand · Marketing · Payments</title>
    <!-- Tailwind + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Core Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- React & ReactDOM & Babel -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(circle at 10% 20%, rgba(15, 20, 35, 1) 0%, rgba(5, 8, 18, 1) 100%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(18, 24, 38, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(249, 115, 22, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            border-color: rgba(249, 115, 22, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #f97316, #dc2626);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
        }
        .btn-gradient:active {
            transform: translateY(1px);
        }
        .tab-active {
            background: rgba(249, 115, 22, 0.15);
            border-bottom: 2px solid #f97316;
            color: white;
        }
        .tab-inactive {
            color: #9ca3af;
            border-bottom: 2px solid transparent;
        }
        .tab-inactive:hover {
            color: #e5e7eb;
            border-bottom-color: rgba(249, 115, 22, 0.4);
        }
        .pro-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
        }
        .layer-item {
            transition: background 0.1s ease;
        }
        .layer-item:hover {
            background: rgba(249, 115, 22, 0.2);
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
        .canvas-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 0.5rem;
            display: inline-block;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #f97316;
            border-radius: 8px;
        }
    </style>
</head>
<body class="text-gray-200">

<div id="root"></div>

<script type="text/babel">
    // ---------- UTILITIES ----------
    const getStorageKey = (role, key) => `${role}_${key}`;
    const saveToLocal = (role, key, data) => localStorage.setItem(getStorageKey(role, key), JSON.stringify(data));
    const loadFromLocal = (role, key, defaultValue) => {
        const raw = localStorage.getItem(getStorageKey(role, key));
        return raw ? JSON.parse(raw) : defaultValue;
    };

    // ---------- CONSTANTS ----------
    const BANK_DETAILS = {
        bank: "FNB (First National Bank)",
        accountName: "Apex Digital (Pty) Ltd",
        accountNumber: "62849612345",
        branchCode: "250655",
        referencePrefix: "APX"
    };
    const DEFAULT_AD = {
        headline: "Create Scroll-Stopping Social Ads in Minutes",
        copy: "Apex Social Media Ad Creator helps you design high‑conversion ads with AI‑assisted copy and instant previews. No design skills needed.",
        image: "https://placehold.co/600x400/1e293b/f97316?text=Apex+Ad+Creator",
        cta: "Try for Free"
    };

    // ---------- DESIGN STUDIO (unchanged logic, but rendered with new styling) ----------
    const DesignStudio = ({ role }) => {
        const canvasRef = React.useRef(null);
        const fabricCanvas = React.useRef(null);
        const [history, setHistory] = React.useState([]);
        const [historyIndex, setHistoryIndex] = React.useState(-1);
        const [layers, setLayers] = React.useState([]);
        const [selectedId, setSelectedId] = React.useState(null);

        const saveState = () => {
            if (!fabricCanvas.current) return;
            const json = JSON.stringify(fabricCanvas.current.toJSON());
            const newHistory = history.slice(0, historyIndex + 1);
            newHistory.push(json);
            setHistory(newHistory);
            setHistoryIndex(newHistory.length - 1);
            updateLayersList();
        };

        const undo = () => {
            if (historyIndex > 0) {
                const prev = history[historyIndex - 1];
                fabricCanvas.current.loadFromJSON(JSON.parse(prev), () => {
                    fabricCanvas.current.renderAll();
                    setHistoryIndex(historyIndex - 1);
                    updateLayersList();
                });
            }
        };
        const redo = () => {
            if (historyIndex < history.length - 1) {
                const next = history[historyIndex + 1];
                fabricCanvas.current.loadFromJSON(JSON.parse(next), () => {
                    fabricCanvas.current.renderAll();
                    setHistoryIndex(historyIndex + 1);
                    updateLayersList();
                });
            }
        };

        const updateLayersList = () => {
            if (!fabricCanvas.current) return;
            const objects = fabricCanvas.current.getObjects();
            setLayers(objects.map((obj, idx) => ({ id: idx, type: obj.type, visible: obj.visible, text: obj.text || '' })));
        };

        React.useEffect(() => {
            if (!canvasRef.current) return;
            const canvas = new fabric.Canvas(canvasRef.current, {
                width: 580,
                height: 360,
                backgroundColor: '#1f2937',
                preserveObjectStacking: true,
            });
            fabricCanvas.current = canvas;
            const saved = loadFromLocal(role, 'design_state', null);
            if (saved) {
                canvas.loadFromJSON(saved, () => canvas.renderAll());
            } else {
                const defaultText = new fabric.IText('APEX\nDESIGN', { left: 100, top: 120, fontSize: 36, fill: '#f97316', fontFamily: 'Inter', fontWeight: 'bold' });
                canvas.add(defaultText);
                canvas.renderAll();
            }
            canvas.on('object:added', saveState);
            canvas.on('object:modified', saveState);
            canvas.on('object:removed', saveState);
            canvas.on('selection:created', () => updateLayersList());
            canvas.on('selection:cleared', () => setSelectedId(null));
            canvas.on('selection:updated', () => updateLayersList());
            saveState();
            updateLayersList();
            return () => canvas.dispose();
        }, [role]);

        const addText = () => {
            const text = new fabric.IText('Edit me', { left: 50, top: 50, fontSize: 24, fill: '#ffffff', fontFamily: 'Inter' });
            fabricCanvas.current.add(text);
            fabricCanvas.current.setActiveObject(text);
            fabricCanvas.current.renderAll();
        };
        const addRectangle = () => {
            const rect = new fabric.Rect({ width: 80, height: 80, fill: '#f97316', left: 200, top: 200, stroke: 'white', strokeWidth: 2 });
            fabricCanvas.current.add(rect);
            fabricCanvas.current.renderAll();
        };
        const uploadImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                fabric.Image.fromURL(event.target.result, (img) => {
                    img.scaleToWidth(150);
                    fabricCanvas.current.add(img);
                    fabricCanvas.current.renderAll();
                });
            };
            reader.readAsDataURL(file);
        };
        const styleSelected = (prop, value) => {
            const active = fabricCanvas.current.getActiveObject();
            if (active) {
                active.set(prop, value);
                fabricCanvas.current.renderAll();
                saveState();
            }
        };
        const toggleLayerVisibility = (idx) => {
            const obj = fabricCanvas.current.getObjects()[idx];
            if (obj) {
                obj.visible = !obj.visible;
                fabricCanvas.current.renderAll();
                updateLayersList();
                saveState();
            }
        };
        const selectLayer = (idx) => {
            const obj = fabricCanvas.current.getObjects()[idx];
            if (obj) {
                fabricCanvas.current.setActiveObject(obj);
                fabricCanvas.current.renderAll();
                setSelectedId(idx);
            }
        };
        const exportPNG = () => {
            const dataURL = fabricCanvas.current.toDataURL({ format: 'png' });
            const link = document.createElement('a');
            link.download = 'apex-design.png';
            link.href = dataURL;
            link.click();
        };
        const exportSVG = () => {
            const svg = fabricCanvas.current.toSVG();
            const blob = new Blob([svg], { type: 'image/svg+xml' });
            saveAs(blob, 'apex-design.svg');
        };
        const saveDesignLocally = () => {
            const json = JSON.stringify(fabricCanvas.current.toJSON());
            saveToLocal(role, 'design_state', json);
            alert('Design saved to browser!');
        };

        return (
            <div className="space-y-4">
                <div className="flex flex-wrap gap-2 items-center">
                    <button onClick={addText} className="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg text-sm font-medium transition"><i className="fas fa-font mr-1"></i> Text</button>
                    <button onClick={addRectangle} className="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded-lg text-sm font-medium transition"><i className="fas fa-square mr-1"></i> Shape</button>
                    <label className="bg-purple-600 hover:bg-purple-500 px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer transition"><i className="fas fa-image mr-1"></i> Image<input type="file" accept="image/*" className="hidden" onChange={uploadImage} /></label>
                    <div className="flex gap-1 border-l border-gray-600 pl-2">
                        <button onClick={undo} className="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded transition"><i className="fas fa-undo"></i></button>
                        <button onClick={redo} className="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded transition"><i className="fas fa-redo"></i></button>
                    </div>
                    <div className="flex gap-1">
                        <button onClick={() => styleSelected('fontWeight', 'bold')} className="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded transition font-bold">B</button>
                        <button onClick={() => styleSelected('fontStyle', 'italic')} className="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded transition italic">I</button>
                        <input type="color" onChange={(e) => styleSelected('fill', e.target.value)} className="w-8 h-8 rounded cursor-pointer" />
                    </div>
                    <button onClick={exportPNG} className="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded-lg text-sm font-medium transition"><i className="fas fa-download mr-1"></i> PNG</button>
                    <button onClick={exportSVG} className="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded-lg text-sm font-medium transition"><i className="fas fa-download mr-1"></i> SVG</button>
                    <button onClick={saveDesignLocally} className="bg-green-700 hover:bg-green-600 px-3 py-1.5 rounded-lg text-sm font-medium transition"><i className="fas fa-save mr-1"></i> Save</button>
                </div>
                <div className="flex justify-center canvas-wrapper">
                    <canvas ref={canvasRef} className="border-2 border-gray-600 rounded-xl shadow-2xl" style={{ maxWidth: '100%', height: 'auto' }}></canvas>
                </div>
                <div className="glass-card p-3 rounded-xl">
                    <h4 className="text-sm font-bold mb-2 flex items-center gap-2"><i className="fas fa-layer-group text-orange-400"></i> Layers</h4>
                    <div className="max-h-32 overflow-y-auto space-y-1">
                        {layers.map((layer, idx) => (
                            <div key={idx} className={`layer-item flex justify-between items-center p-1 text-xs rounded cursor-pointer ${selectedId === idx ? 'bg-orange-800' : ''}`} onClick={() => selectLayer(idx)}>
                                <span><i className={`fas fa-${layer.type === 'text' ? 'font' : 'square'} mr-1`}></i> {layer.text || layer.type}</span>
                                <i className={`fas fa-eye${layer.visible ? '' : '-slash'} cursor-pointer hover:text-orange-400`} onClick={(e) => { e.stopPropagation(); toggleLayerVisibility(idx); }}></i>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    // ---------- BRANDING STUDIO ----------
    const BrandingStudio = ({ role }) => {
        const [primary, setPrimary] = React.useState(loadFromLocal(role, 'brand_primary', '#f97316'));
        const [secondary, setSecondary] = React.useState(loadFromLocal(role, 'brand_secondary', '#3b82f6'));
        const [font, setFont] = React.useState(loadFromLocal(role, 'brand_font', 'Inter'));
        const [logo, setLogo] = React.useState(loadFromLocal(role, 'brand_logo', 'https://placehold.co/200x80/1e293b/f97316?text=APEX+LOGO'));
        const [tempLogo, setTempLogo] = React.useState('');

        React.useEffect(() => {
            saveToLocal(role, 'brand_primary', primary);
            saveToLocal(role, 'brand_secondary', secondary);
            saveToLocal(role, 'brand_font', font);
            saveToLocal(role, 'brand_logo', logo);
        }, [primary, secondary, font, logo, role]);

        const exportBrandKitZip = async () => {
            const zip = new JSZip();
            const cssContent = `:root { --primary: ${primary}; --secondary: ${secondary}; --font: ${font}; } .btn-primary { background: var(--primary); }`;
            zip.file("brand.css", cssContent);
            if (logo && logo.startsWith('http')) {
                try {
                    const response = await fetch(logo);
                    const blob = await response.blob();
                    zip.file("logo.png", blob);
                } catch(e) { console.warn("Could not fetch logo"); }
            }
            const content = await zip.generateAsync({ type: "blob" });
            saveAs(content, "apex-brand-kit.zip");
        };

        return (
            <div className="grid md:grid-cols-2 gap-6">
                <div className="space-y-4">
                    <div><label className="block text-sm font-medium mb-1">Primary Color</label><input type="color" value={primary} onChange={e => setPrimary(e.target.value)} className="w-full h-10 rounded-lg cursor-pointer bg-gray-800" /></div>
                    <div><label className="block text-sm font-medium mb-1">Secondary Color</label><input type="color" value={secondary} onChange={e => setSecondary(e.target.value)} className="w-full h-10 rounded-lg cursor-pointer bg-gray-800" /></div>
                    <div><label className="block text-sm font-medium mb-1">Brand Font</label><select value={font} onChange={e => setFont(e.target.value)} className="bg-gray-800 p-2 rounded-lg w-full"><option>Inter</option><option>Poppins</option><option>Montserrat</option></select></div>
                    <div><label className="block text-sm font-medium mb-1">Logo URL</label><div className="flex gap-2"><input type="text" value={tempLogo} onChange={e => setTempLogo(e.target.value)} className="bg-gray-800 flex-1 p-2 rounded-lg" placeholder="Image URL" /><button onClick={() => { if(tempLogo) setLogo(tempLogo); }} className="bg-orange-600 hover:bg-orange-500 px-4 rounded-lg transition">Set</button></div></div>
                    <button onClick={exportBrandKitZip} className="bg-blue-600 hover:bg-blue-500 w-full py-2 rounded-lg mt-2 transition font-medium"><i className="fas fa-file-zipper mr-2"></i> Download Brand Kit (ZIP)</button>
                </div>
                <div className="glass-card p-5 rounded-2xl" style={{ backgroundColor: secondary+'20', borderTopColor: primary, borderTopWidth: 4, fontFamily: font }}>
                    <h3 style={{color: primary}} className="text-xl font-bold">APEX Preview</h3>
                    <div className="flex gap-2 mt-3"><span className="px-3 py-1 rounded-full text-white text-sm" style={{background:primary}}>Primary</span><span className="px-3 py-1 rounded-full text-white text-sm" style={{background:secondary}}>Secondary</span></div>
                    <img src={logo} alt="logo" className="max-h-20 mt-4 object-contain" />
                </div>
            </div>
        );
    };

    // ---------- MARKETING STUDIO ----------
    const MarketingStudio = ({ role, aggressiveBoostFlag, onBoostAcknowledge }) => {
        const [campaigns, setCampaigns] = React.useState(loadFromLocal(role, 'campaigns', [
            { id: 1, name: "Summer Blast", budget: 2500, impressions: 45800, clicks: 3100, conversions: 342, status: "active" },
            { id: 2, name: "Flash Sale X", budget: 1200, impressions: 23400, clicks: 2100, conversions: 198, status: "active" },
        ]));
        const [newCampaign, setNewCampaign] = React.useState({ name: "", budget: "" });

        React.useEffect(() => {
            saveToLocal(role, 'campaigns', campaigns);
        }, [campaigns, role]);

        React.useEffect(() => {
            if (aggressiveBoostFlag) {
                setCampaigns(prev => prev.map(c => ({
                    ...c,
                    impressions: Math.floor(c.impressions * 1.4),
                    clicks: Math.floor(c.clicks * 1.5),
                    conversions: Math.floor(c.conversions * 1.35),
                })));
                if (onBoostAcknowledge) onBoostAcknowledge();
            }
        }, [aggressiveBoostFlag]);

        const addCampaign = () => {
            if (!newCampaign.name || !newCampaign.budget) return;
            const newId = campaigns.length + 1;
            setCampaigns([...campaigns, {
                id: newId,
                name: newCampaign.name,
                budget: parseInt(newCampaign.budget),
                impressions: Math.floor(Math.random() * 20000) + 5000,
                clicks:
